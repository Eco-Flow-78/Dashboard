<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoFlow-IoT | Master SCADA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #ffffff; --pipe-dark: #0f172a; --water: #3b82f6; 
            --text-main: #0f172a; --text-dim: #64748b; --success: #22c55e; --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text-main);
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }
        
        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; border-bottom: 2px solid #e2e8f0; background: #f8fafc;
        }
        .sys-uptime { font-family: 'JetBrains Mono'; font-weight: bold; color: var(--text-dim); }
        .sys-status { padding: 4px 12px; border-radius: 4px; font-weight: bold; font-family: 'JetBrains Mono'; font-size: 14px; }
        .online { background: #dcfce7; color: #166534; border: 1px solid #22c55e; }
        .offline { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }

        /* SCADA Viewport - Bulletproof Scaling */
        .scada-container { flex: 1; width: 100%; height: 100%; overflow: hidden; position: relative; background: #ffffff; }
        svg { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* Piping Styles - Explicit Dimensions */
        .pipe-bg { stroke: var(--pipe-dark); fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .pipe-core { stroke: #ffffff; fill: none; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.3s; }
        .flowing { stroke: var(--water) !important; }
        
        /* Waterfall / Flow animations */
        .flow-dash { stroke-dasharray: 10 15; animation: dashFlow 0.5s linear infinite; stroke: #fff; opacity: 0; }
        .flowing-dash { opacity: 0.6; }
        @keyframes dashFlow { to { stroke-dashoffset: -25; } }
        
        /* Gears */
        .gear { transform-origin: center; transform-box: fill-box; }
        .spinning { animation: spin 0.4s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SCADA UI Elements */
        .data-box { fill: #ffffff; stroke: var(--pipe-dark); stroke-width: 2; rx: 4; filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.06)); }
        .label { font-weight: 800; font-size: 13px; fill: var(--text-dim); letter-spacing: 0.5px; }
        .val { font-family: 'JetBrains Mono'; font-weight: bold; font-size: 13px; fill: var(--text-main); }
        .val-highlight { fill: var(--water); font-size: 16px; }

        /* Numeric Input Styling */
        .control-panel {
            display: flex; gap: 8px; align-items: center; justify-content: center; 
            height: 100%; width: 100%; padding: 0 10px;
        }
        .num-input {
            width: 70px; height: 32px; font-size: 18px; font-family: 'JetBrains Mono'; font-weight: bold; 
            text-align: center; border: 2px solid #0f172a; border-radius: 4px; outline: none;
        }
        .btn-set {
            height: 32px; padding: 0 16px; background: #0f172a; color: white; border: none; 
            border-radius: 4px; font-weight: 800; cursor: pointer; font-family: 'Inter'; font-size: 14px;
        }
        .btn-set:active { background: #3b82f6; transform: scale(0.98); }
        
        /* Chart Container */
        .chart-wrapper {
            width: 100%; height: 100%; background: #ffffff; border: 2px solid #0f172a; 
            border-radius: 6px; padding: 10px; box-shadow: 4px 4px 0 rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="font-size: 22px; font-weight: 800; letter-spacing: 1px;">EcoFlow-IoT · Master Control HMI</h1>
        <p style="font-size: 11px; color: #64748b; font-weight: 600;">ESP32 TELEMETRY & SERVO COMMAND NODE</p>
    </div>
    <div style="text-align: right;">
        <div id="status-badge" class="sys-status offline">● OFFLINE</div>
        <div class="sys-uptime" style="font-size: 12px; margin-top: 4px;">SYSTEM UPTIME: <span id="v-uptime">00:00:00</span></div>
    </div>
</header>

<div class="scada-container">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
        <defs>
            <clipPath id="tank-clip"><rect x="50" y="700" width="380" height="180" rx="8"/></clipPath>
            <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#cbd5e1"/><stop offset="100%" stop-color="#64748b"/></linearGradient>
            
            <path id="p-half-a" d="M 120,720 V 550 H 260" />
            <path id="p-half-b" d="M 300,720 V 550 H 260" />
            
            <path id="p-one-main" d="M 260,550 V 400 H 900" />
            <path id="p-one-ret" d="M 900,400 H 1050 V 650 H 200 V 700" />
        </defs>

        <text x="20" y="60" fill="#f1f5f9" font-size="44" font-weight="800" font-family="sans-serif">ZONE 4: ELECTRONICS & DSP</text>
        <text x="20" y="320" fill="#f1f5f9" font-size="44" font-weight="800" font-family="sans-serif">ZONE 3: 1" MAIN PROCESS LINE</text>
        <text x="20" y="680" fill="#f1f5f9" font-size="44" font-weight="800" font-family="sans-serif">ZONE 1: RESERVOIR & 1/2" SUPPLY</text>

        <g id="pipe-borders">
            <use href="#p-half-a" class="pipe-bg" stroke-width="12"/> <use href="#p-half-b" class="pipe-bg" stroke-width="12"/> <use href="#p-one-main" class="pipe-bg" stroke-width="20"/> <use href="#p-one-ret" class="pipe-bg" stroke-width="20"/> </g>
        <g id="pipe-cores">
            <use href="#p-half-a" id="core-ma" class="pipe-core" stroke-width="6"/> <use href="#p-half-b" id="core-mb" class="pipe-core" stroke-width="6"/> <use href="#p-one-main" id="core-main" class="pipe-core" stroke-width="12"/> <use href="#p-one-ret" id="core-return" class="pipe-core flowing" stroke-width="12"/> </g>

        <rect x="46" y="696" width="388" height="188" fill="none" stroke="#0f172a" stroke-width="8" rx="10"/>
        <rect x="50" y="700" width="380" height="180" fill="#e2e8f0" rx="8"/>
        <path fill="rgba(59, 130, 246, 0.4)" clip-path="url(#tank-clip)" d="M50,750 Q145,730 240,750 T430,750 V880 H50 Z">
            <animate attributeName="d" dur="3s" repeatCount="indefinite" values="M50,750 Q145,730 240,750 T430,750 V880 H50 Z; M50,750 Q145,770 240,750 T430,750 V880 H50 Z; M50,750 Q145,730 240,750 T430,750 V880 H50 Z"/>
        </path>

        <g transform="translate(120, 780)">
            <circle r="30" fill="url(#metal)" stroke="#0f172a" stroke-width="4"/>
            <path id="gear-a" d="M-18,-18 L18,18 M-18,18 L18,-18 M0,-25 L0,25 M-25,0 L25,0" stroke="#0f172a" stroke-width="6" class="gear"/>
            <rect x="-95" y="40" width="90" height="40" class="data-box"/>
            <text x="-50" y="55" class="label" font-size="11" text-anchor="middle">MOTOR A</text>
            <text x="-50" y="72" id="lbl-ma" class="val" fill="#ef4444" text-anchor="middle">OFF (0 L/H)</text>
        </g>

        <g transform="translate(300, 780)">
            <circle r="30" fill="url(#metal)" stroke="#0f172a" stroke-width="4"/>
            <path id="gear-b" d="M-18,-18 L18,18 M-18,18 L18,-18 M0,-25 L0,25 M-25,0 L25,0" stroke="#0f172a" stroke-width="6" class="gear"/>
            <rect x="5" y="40" width="90" height="40" class="data-box"/>
            <text x="50" y="55" class="label" font-size="11" text-anchor="middle">MOTOR B</text>
            <text x="50" y="72" id="lbl-mb" class="val" fill="#ef4444" text-anchor="middle">OFF (0 L/H)</text>
        </g>

        <text x="100" y="620" class="label" font-size="11" fill="#64748b">1/2" PIPE</text>
        <text x="320" y="620" class="label" font-size="11" fill="#64748b">1/2" PIPE</text>
        <circle cx="260" cy="550" r="16" fill="#0f172a"/>
        <text x="200" y="530" font-family="Inter" font-weight="800" font-size="12" fill="#64748b" text-anchor="middle">MERGE</text>
        <text x="260" y="480" class="label" font-size="11" fill="#64748b">1" PIPE</text>

        <g transform="translate(450, 400)">
            <rect x="-25" y="-20" width="50" height="40" fill="url(#metal)" stroke="#0f172a" stroke-width="4"/>
            <circle cx="0" cy="0" r="16" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
            <line id="valve-disc" x1="-12" y1="0" x2="12" y2="0" stroke="#ef4444" stroke-width="5" stroke-linecap="round" style="transition: transform 0.5s;"/>
            
            <rect x="-20" y="-55" width="40" height="35" fill="#1e293b" stroke="#0f172a" stroke-width="3" rx="3"/>
            <text x="0" y="-38" fill="#fff" font-size="10" font-weight="bold" font-family="sans-serif" text-anchor="middle">SERVO</text>
            
            <rect x="-100" y="-150" width="200" height="85" class="data-box"/>
            <text x="0" y="-130" class="label" text-anchor="middle" fill="#2563eb">COMMAND VALVE %</text>
            <foreignObject x="-95" y="-120" width="190" height="50">
                <div class="control-panel">
                    <input type="number" id="valve-input" class="num-input" min="0" max="100" value="0">
                    <span style="font-weight: 800; font-size: 18px; color: #0f172a;">%</span>
                    <button id="btn-set-valve" class="btn-set">SET</button>
                </div>
            </foreignObject>
        </g>

        <g transform="translate(750, 400)">
            <rect x="-70" y="-25" width="10" height="50" fill="#0f172a"/>
            <rect x="60" y="-25" width="10" height="50" fill="#0f172a"/>
            <rect x="-60" y="-25" width="120" height="50" fill="#f8fafc" stroke="#0f172a" stroke-width="4"/>
            
            <rect x="-30" y="-45" width="60" height="20" fill="#b45309" stroke="#78350f" stroke-width="2" rx="2"/>
            <line x1="-20" y1="-45" x2="-20" y2="-25" stroke="#78350f" stroke-width="2"/>
            <line x1="0" y1="-45" x2="0" y2="-25" stroke="#78350f" stroke-width="2"/>
            <line x1="20" y1="-45" x2="20" y2="-25" stroke="#78350f" stroke-width="2"/>
            <text x="0" y="-50" font-weight="bold" font-size="14" text-anchor="middle">N</text>

            <rect x="-30" y="25" width="60" height="20" fill="#b45309" stroke="#78350f" stroke-width="2" rx="2"/>
            <line x1="-20" y1="25" x2="-20" y2="45" stroke="#78350f" stroke-width="2"/>
            <line x1="0" y1="25" x2="0" y2="45" stroke="#78350f" stroke-width="2"/>
            <line x1="20" y1="25" x2="20" y2="45" stroke="#78350f" stroke-width="2"/>
            <text x="0" y="60" font-weight="bold" font-size="14" text-anchor="middle">S</text>

            <circle cx="0" cy="-5" r="6" fill="#eab308" stroke="#0f172a" stroke-width="2"/>
            <circle cx="0" cy="5" r="6" fill="#eab308" stroke="#0f172a" stroke-width="2"/>
            
            <path d="M 0,-11 V -230" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 6" fill="none"/>
        </g>

        <g transform="translate(600, 140)">
            <rect x="-55" y="-30" width="110" height="65" class="data-box"/>
            <text x="0" y="-12" class="label" text-anchor="middle">AD620 InAmp</text>
            <text x="0" y="3" class="label" font-size="9" text-anchor="middle">RAW EMF GENERATED</text>
            <text x="0" y="20" id="v-raw" class="val" fill="#ef4444" text-anchor="middle">-- mV</text>
            <line x1="55" y1="0" x2="110" y2="0" stroke="#0f172a" stroke-width="2"/>
        </g>

        <g transform="translate(765, 140)">
            <rect x="-55" y="-30" width="110" height="65" class="data-box"/>
            <text x="0" y="-12" class="label" text-anchor="middle">RC Filter</text>
            <text x="0" y="3" class="label" font-size="9" text-anchor="middle">HARDWARE NOISE FLT</text>
            <text x="0" y="20" class="val" fill="#22c55e" text-anchor="middle">ACTIVE</text>
            <line x1="55" y1="0" x2="110" y2="0" stroke="#0f172a" stroke-width="2"/>
        </g>

        <g transform="translate(930, 140)">
            <rect x="-55" y="-30" width="110" height="65" class="data-box"/>
            <text x="0" y="-12" class="label" text-anchor="middle">AS1115 ADC</text>
            <text x="0" y="3" class="label" font-size="9" text-anchor="middle">16-BIT DIGITAL</text>
            <text x="0" y="20" id="v-adc" class="val" fill="#3b82f6" text-anchor="middle">--</text>
            <line x1="55" y1="0" x2="110" y2="0" stroke="#0f172a" stroke-width="2"/>
        </g>

        <g transform="translate(1120, 140)">
            <rect x="-80" y="-45" width="160" height="90" class="data-box" fill="#0f172a" stroke="none"/>
            <text x="0" y="-22" class="label" fill="#ffffff" text-anchor="middle">ESP32 MASTER</text>
            <text x="0" y="-3" class="label" font-size="9" fill="#94a3b8" text-anchor="middle">KALMAN FILTERED EMF</text>
            <text x="0" y="15" id="v-kalman" class="val val-highlight" text-anchor="middle">-- mV</text>
            <text x="0" y="32" class="label" font-size="9" fill="#94a3b8" text-anchor="middle">OFFSET (BASELINE): <tspan id="v-offset" fill="#fff">--</tspan></text>
        </g>

        <g transform="translate(1330, 280)">
            <rect x="-130" y="-60" width="260" height="130" class="data-box"/>
            <text x="-110" y="-35" class="label" font-size="14">INST FLOW RATE:</text>
            <text x="110" y="-35" id="v-flow" class="val val-highlight" text-anchor="end">0.00 L/min</text>
            
            <text x="-110" y="-5" class="label" font-size="14">TOTAL VOL FLOW:</text>
            <text x="110" y="-5" id="v-total" class="val" fill="#2563eb" text-anchor="end">0.0 L</text>
            
            <text x="-110" y="25" class="label" font-size="14">VALVE OPEN POS:</text>
            <text x="110" y="25" id="v-valve-act" class="val" fill="#ef4444" text-anchor="end">0%</text>

            <text x="-110" y="55" class="label" font-size="14">TIME SYSTEM ON:</text>
            <text x="110" y="55" id="v-sys-time" class="val" fill="#0f172a" text-anchor="end">0 min</text>
        </g>

        <foreignObject x="1200" y="430" width="380" height="380">
            <div class="chart-wrapper">
                <canvas id="flowChart"></canvas>
            </div>
        </foreignObject>

    </svg>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- Firebase Setup ---
    const firebaseConfig = {
        apiKey: "AIzaSyA9TrLnpHEsRijt8hbljFrJA0AU2c-Jk5g",
        authDomain: "majortrial-1.firebaseapp.com",
        databaseURL: "https://majortrial-1-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "majortrial-1",
        storageBucket: "majortrial-1.firebasestorage.app",
        messagingSenderId: "590621103333",
        appId: "1:590621103333:web:0c98d6b783bc9f12dd300c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- DOM Elements ---
    const el = {
        status: document.getElementById('status-badge'),
        uptime: document.getElementById('v-uptime'),
        sysTime: document.getElementById('v-sys-time'),
        valveInput: document.getElementById('valve-input'),
        btnSetValve: document.getElementById('btn-set-valve'),
        coreMa: document.getElementById('core-ma'),
        coreMb: document.getElementById('core-mb'),
        coreMain: document.getElementById('core-main'),
        gearA: document.getElementById('gear-a'),
        gearB: document.getElementById('gear-b'),
        lblMa: document.getElementById('lbl-ma'),
        lblMb: document.getElementById('lbl-mb'),
        valveDisc: document.getElementById('valve-disc'),
        vRaw: document.getElementById('v-raw'),
        vAdc: document.getElementById('v-adc'),
        vKalman: document.getElementById('v-kalman'),
        vOffset: document.getElementById('v-offset'),
        vFlow: document.getElementById('v-flow'),
        vTotal: document.getElementById('v-total'),
        vValveAct: document.getElementById('v-valve-act')
    };

    // --- Write Command to ESP32 (Numeric Input Only) ---
    el.btnSetValve.addEventListener('click', () => {
        let val = parseInt(el.valveInput.value, 10);
        if(isNaN(val)) val = 0;
        if(val < 0) val = 0;
        if(val > 100) val = 100;
        
        el.valveInput.value = val; // Force UI boundaries
        
        // Write the setpoint to Firebase where your ESP32 should listen
        set(ref(db, 'system/control/valve_setpoint'), val);
        
        // Visual feedback on button
        const btn = el.btnSetValve;
        btn.textContent = "SENT";
        btn.style.background = "#22c55e";
        setTimeout(() => {
            btn.textContent = "SET";
            btn.style.background = "#0f172a";
        }, 1000);
    });

    // --- Setup Chart.js (Flow vs EMF) ---
    const ctx = document.getElementById('flowChart').getContext('2d');
    const flowChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], 
            datasets: [
                { label: 'Flow (L/min)', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', yAxisID: 'y', fill: true, tension: 0.4 },
                { label: 'EMF (mV)', data: [], borderColor: '#ef4444', borderDash: [5, 5], yAxisID: 'y1', tension: 0.4 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            plugins: { title: { display: true, text: 'FLOW vs EMF', font: { family: 'Inter', weight: 'bold' } } },
            scales: {
                x: { display: false },
                y: { type: 'linear', display: true, position: 'left', min: 0 },
                y1: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false } }
            }
        }
    });

    // --- Uptime Formatter ---
    function formatUptime(seconds) {
        if (!seconds) return "00:00:00";
        const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    // --- Read Data from ESP32 ---
    onValue(ref(db, '.info/connected'), (snap) => {
        const isOnline = snap.val() === true;
        el.status.textContent = isOnline ? '● ONLINE' : '● OFFLINE';
        el.status.className = isOnline ? 'sys-status online' : 'sys-status offline';
    });

    onValue(ref(db, 'telemetry'), (snapshot) => {
        const data = snapshot.val() || {};
        
        // 1. Motor States (Reported by ESP)
        const m_a = data.motors?.a_on || false;
        const m_b = data.motors?.b_on || false;
        const any_flow = m_a || m_b;

        el.coreMa.classList.toggle('flowing', m_a);
        el.gearA.classList.toggle('spinning', m_a);
        el.lblMa.textContent = m_a ? 'ON (1100 L/H)' : 'OFF (0 L/H)';
        el.lblMa.setAttribute('fill', m_a ? '#22c55e' : '#ef4444');

        el.coreMb.classList.toggle('flowing', m_b);
        el.gearB.classList.toggle('spinning', m_b);
        el.lblMb.textContent = m_b ? 'ON (1100 L/H)' : 'OFF (0 L/H)';
        el.lblMb.setAttribute('fill', m_b ? '#22c55e' : '#ef4444');

        el.coreMain.classList.toggle('flowing', any_flow);

        // 2. Servo / Valve Actual State
        const v_act = data.valve?.actual_pct || 0;
        el.vValveAct.textContent = v_act + '%';
        const rotation = -90 + (v_act / 100) * 90; // Map 0-100% to -90 to 0 degrees
        el.valveDisc.style.transform = `rotate(${rotation}deg)`;

        // 3. DSP / Electronics Data
        const s_raw = data.signals?.raw_emf || 0;
        const s_adc = data.signals?.adc_val || 0;
        const s_kal = data.signals?.kalman_emf || 0;
        const s_off = data.signals?.offset_baseline || 0;
        
        el.vRaw.textContent = s_raw.toFixed(2) + ' mV';
        el.vAdc.textContent = s_adc; 
        el.vKalman.textContent = s_kal.toFixed(2) + ' mV';
        el.vOffset.textContent = s_off.toFixed(2) + ' mV';

        // 4. Flow Metrics
        const f_rate = data.flow?.inst_rate || 0;
        const f_total = data.flow?.total_vol || 0;
        const uptime = data.system?.uptime_sec || 0;

        el.vFlow.textContent = f_rate.toFixed(2) + ' L/min';
        el.vTotal.textContent = f_total.toFixed(1) + ' L';
        el.uptime.textContent = formatUptime(uptime);
        el.sysTime.textContent = Math.floor(uptime / 60) + ' min';

        // 5. Update Live Chart
        const timeNow = new Date().toLocaleTimeString();
        flowChart.data.labels.push(timeNow);
        flowChart.data.datasets[0].data.push(f_rate);
        flowChart.data.datasets[1].data.push(s_kal);

        if (flowChart.data.labels.length > 30) {
            flowChart.data.labels.shift();
            flowChart.data.datasets[0].data.shift();
            flowChart.data.datasets[1].data.shift();
        }
        flowChart.update();
    });
</script>
</body>
</html>
