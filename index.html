<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EcoFlow-IoT | Advanced SCADA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #ffffff; --pipe-dark: #0f172a; --water: #3b82f6; --water-dim: #cbd5e1;
            --text-main: #0f172a; --text-dim: #64748b; --success: #22c55e; --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text-main);
            height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }
        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; border-bottom: 2px solid #e2e8f0; background: #f8fafc;
        }
        .sys-uptime { font-family: 'JetBrains Mono'; font-weight: bold; color: var(--text-dim); }
        .sys-status { padding: 4px 12px; border-radius: 4px; font-weight: bold; font-family: 'JetBrains Mono'; font-size: 14px; }
        .online { background: #dcfce7; color: #166534; border: 1px solid #22c55e; }
        .offline { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }

        /* SCADA Viewport */
        .scada-container { flex: 1; width: 100%; height: 100%; overflow: hidden; position: relative; }
        svg { width: 100%; height: 100%; object-fit: contain; }

        /* Pipes & Flow Animation */
        .pipe-bg { stroke: var(--pipe-dark); fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .pipe-core { stroke: #fff; fill: none; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.3s; }
        .flowing { stroke: var(--water) !important; }
        .flow-dash { stroke-dasharray: 10 15; animation: dashFlow 0.5s linear infinite; stroke: #fff; opacity: 0; }
        .flowing-dash { opacity: 0.6; }
        @keyframes dashFlow { to { stroke-dashoffset: -25; } }

        /* Gears */
        .gear { transform-origin: center; transform-box: fill-box; }
        .spinning { animation: spin 0.4s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* UI Elements */
        .data-box { fill: #fff; stroke: var(--pipe-dark); stroke-width: 2; rx: 4; filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.1)); }
        .label { font-weight: 800; font-size: 14px; fill: var(--text-dim); }
        .val { font-family: 'JetBrains Mono'; font-weight: bold; font-size: 14px; fill: var(--text-main); }
        .val-highlight { fill: var(--water); font-size: 16px; }

        /* Slider Input */
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; border: 1px solid #cbd5e1; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--water); margin-top: -9px; border: 2px solid #0f172a; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="font-size: 20px; font-weight: 800; letter-spacing: 1px;">EcoFlow-IoT HMI</h1>
        <p style="font-size: 11px; color: #64748b;">MASTER TELEMETRY & CONTROL NODE</p>
    </div>
    <div style="text-align: right;">
        <div id="status-badge" class="sys-status offline">● OFFLINE</div>
        <div class="sys-uptime" style="font-size: 12px; margin-top: 4px;">UPTIME: <span id="v-uptime">00:00:00</span></div>
    </div>
</header>

<div class="scada-container">
    <svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet">
        <defs>
            <clipPath id="tank-clip"><rect x="50" y="700" width="350" height="180" rx="8"/></clipPath>
            <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#cbd5e1"/><stop offset="100%" stop-color="#64748b"/></linearGradient>
            
            <path id="p-ma" d="M 120,720 V 550" /> <path id="p-mb" d="M 280,720 V 550" /> <path id="p-merge" d="M 120,550 H 280 V 400 H 400" /> <path id="p-main" d="M 400,400 H 900" /> <path id="p-return" d="M 900,400 H 1000 V 650 H 200 V 700" /> </defs>

        <text x="20" y="50" fill="#f1f5f9" font-size="40" font-weight="800" font-family="sans-serif">ELECTRONICS & DSP</text>
        <text x="20" y="320" fill="#f1f5f9" font-size="40" font-weight="800" font-family="sans-serif">MAIN PROCESS LAYER</text>

        <g id="pipe-borders">
            <use href="#p-ma" class="pipe-bg" stroke-width="12"/>
            <use href="#p-mb" class="pipe-bg" stroke-width="12"/>
            <use href="#p-merge" class="pipe-bg" stroke-width="18"/>
            <use href="#p-main" class="pipe-bg" stroke-width="18"/>
            <use href="#p-return" class="pipe-bg" stroke-width="18"/>
        </g>
        <g id="pipe-cores">
            <use href="#p-ma" id="core-ma" class="pipe-core" stroke-width="6"/>
            <use href="#p-mb" id="core-mb" class="pipe-core" stroke-width="6"/>
            <use href="#p-merge" id="core-merge" class="pipe-core" stroke-width="10"/>
            <use href="#p-main" id="core-main" class="pipe-core" stroke-width="10"/>
            <use href="#p-return" id="core-return" class="pipe-core flowing" stroke-width="10"/>
        </g>
        <g id="pipe-anim">
            <use href="#p-merge" id="dash-merge" class="pipe-bg flow-dash" stroke-width="4"/>
            <use href="#p-main" id="dash-main" class="pipe-bg flow-dash" stroke-width="4"/>
        </g>

        <rect x="46" y="696" width="358" height="188" fill="none" stroke="#0f172a" stroke-width="8" rx="10"/>
        <rect x="50" y="700" width="350" height="180" fill="#e2e8f0" rx="8"/>
        <path fill="rgba(59, 130, 246, 0.4)" clip-path="url(#tank-clip)" d="M50,750 Q137,730 225,750 T400,750 V880 H50 Z">
            <animate attributeName="d" dur="3s" repeatCount="indefinite" values="M50,750 Q137,730 225,750 T400,750 V880 H50 Z; M50,750 Q137,770 225,750 T400,750 V880 H50 Z; M50,750 Q137,730 225,750 T400,750 V880 H50 Z"/>
        </path>

        <g transform="translate(120, 780)">
            <circle r="30" fill="url(#metal)" stroke="#0f172a" stroke-width="4"/>
            <path id="gear-a" d="M-18,-18 L18,18 M-18,18 L18,-18 M0,-25 L0,25 M-25,0 L25,0" stroke="#0f172a" stroke-width="6" class="gear"/>
            <rect x="-95" y="40" width="80" height="35" class="data-box"/>
            <text x="-55" y="55" class="label" font-size="12" text-anchor="middle">MOTOR A</text>
            <text x="-55" y="70" id="lbl-ma" class="val" fill="#ef4444" text-anchor="middle">OFF</text>
        </g>

        <g transform="translate(280, 780)">
            <circle r="30" fill="url(#metal)" stroke="#0f172a" stroke-width="4"/>
            <path id="gear-b" d="M-18,-18 L18,18 M-18,18 L18,-18 M0,-25 L0,25 M-25,0 L25,0" stroke="#0f172a" stroke-width="6" class="gear"/>
            <rect x="15" y="40" width="80" height="35" class="data-box"/>
            <text x="55" y="55" class="label" font-size="12" text-anchor="middle">MOTOR B</text>
            <text x="55" y="70" id="lbl-mb" class="val" fill="#ef4444" text-anchor="middle">OFF</text>
        </g>

        <text x="200" y="540" font-family="Inter" font-weight="800" font-size="12" fill="#64748b" text-anchor="middle">1/2" TO 1" MERGE</text>

        <g transform="translate(450, 400)">
            <rect x="-25" y="-20" width="50" height="40" fill="url(#metal)" stroke="#0f172a" stroke-width="4"/>
            <circle cx="0" cy="0" r="16" fill="#f8fafc" stroke="#0f172a" stroke-width="3"/>
            <line id="valve-disc" x1="-12" y1="0" x2="12" y2="0" stroke="#ef4444" stroke-width="5" stroke-linecap="round" style="transition: transform 0.5s;"/>
            <rect x="-20" y="-55" width="40" height="35" fill="#1e293b" stroke="#0f172a" stroke-width="3" rx="3"/>
            <text x="0" y="-38" fill="#fff" font-size="10" font-weight="bold" font-family="sans-serif" text-anchor="middle">SERVO</text>
            
            <rect x="-90" y="-150" width="180" height="85" class="data-box"/>
            <text x="0" y="-130" class="label" text-anchor="middle" fill="#2563eb">SET VALVE OPENING %</text>
            <text x="0" y="-110" id="lbl-valve-set" class="val val-highlight" text-anchor="middle">0%</text>
            <foreignObject x="-75" y="-100" width="150" height="30">
                <input type="range" id="valve-slider" min="0" max="100" step="1" value="0">
            </foreignObject>
        </g>

        <g transform="translate(750, 400)">
            <rect x="-70" y="-25" width="10" height="50" fill="#0f172a"/>
            <rect x="60" y="-25" width="10" height="50" fill="#0f172a"/>
            <rect x="-60" y="-25" width="120" height="50" fill="#f8fafc" stroke="#0f172a" stroke-width="4"/>
            
            <rect x="-30" y="-45" width="60" height="20" fill="#b45309" stroke="#78350f" stroke-width="2" rx="2"/>
            <line x1="-20" y1="-45" x2="-20" y2="-25" stroke="#78350f" stroke-width="2"/>
            <line x1="0" y1="-45" x2="0" y2="-25" stroke="#78350f" stroke-width="2"/>
            <line x1="20" y1="-45" x2="20" y2="-25" stroke="#78350f" stroke-width="2"/>
            <text x="0" y="-50" font-weight="bold" font-size="14" text-anchor="middle">N</text>

            <rect x="-30" y="25" width="60" height="20" fill="#b45309" stroke="#78350f" stroke-width="2" rx="2"/>
            <line x1="-20" y1="25" x2="-20" y2="45" stroke="#78350f" stroke-width="2"/>
            <line x1="0" y1="25" x2="0" y2="45" stroke="#78350f" stroke-width="2"/>
            <line x1="20" y1="25" x2="20" y2="45" stroke="#78350f" stroke-width="2"/>
            <text x="0" y="60" font-weight="bold" font-size="14" text-anchor="middle">S</text>

            <circle cx="0" cy="0" r="6" fill="#eab308" stroke="#0f172a" stroke-width="2"/>
            <path d="M 0,-6 V -120" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 4" fill="none"/>
        </g>

        <g transform="translate(600, 150)">
            <rect x="-50" y="-30" width="100" height="60" class="data-box"/>
            <text x="0" y="-10" class="label" text-anchor="middle">AD620 InAmp</text>
            <text x="0" y="10" class="label" font-size="10" text-anchor="middle">RAW EMF</text>
            <text x="0" y="22" id="v-raw" class="val" fill="#ef4444" text-anchor="middle">-- mV</text>
            <line x1="50" y1="0" x2="100" y2="0" stroke="#0f172a" stroke-width="2"/>
        </g>

        <g transform="translate(750, 150)">
            <rect x="-50" y="-30" width="100" height="60" class="data-box"/>
            <text x="0" y="-10" class="label" text-anchor="middle">RC Filter</text>
            <text x="0" y="10" class="label" font-size="10" text-anchor="middle">NOISE FILTER</text>
            <text x="0" y="22" class="val" text-anchor="middle">Active</text>
            <line x1="50" y1="0" x2="100" y2="0" stroke="#0f172a" stroke-width="2"/>
        </g>

        <g transform="translate(900, 150)">
            <rect x="-50" y="-30" width="100" height="60" class="data-box"/>
            <text x="0" y="-10" class="label" text-anchor="middle">AS1115 ADC</text>
            <text x="0" y="10" class="label" font-size="10" text-anchor="middle">DIGITAL (16b)</text>
            <text x="0" y="22" id="v-adc" class="val" fill="#3b82f6" text-anchor="middle">--</text>
            <line x1="50" y1="0" x2="100" y2="0" stroke="#0f172a" stroke-width="2"/>
        </g>

        <g transform="translate(1080, 150)">
            <rect x="-80" y="-40" width="160" height="80" class="data-box" fill="#0f172a" stroke="none"/>
            <text x="0" y="-20" class="label" fill="#fff" text-anchor="middle">ESP32 MCU</text>
            <text x="0" y="0" class="label" font-size="10" fill="#94a3b8" text-anchor="middle">KALMAN FILTERED EMF</text>
            <text x="0" y="15" id="v-kalman" class="val val-highlight" text-anchor="middle">-- mV</text>
            <text x="0" y="30" class="label" font-size="10" fill="#94a3b8" text-anchor="middle">BASELINE OFFSET: <tspan id="v-offset" fill="#fff">--</tspan></text>
        </g>

        <g transform="translate(1250, 400)">
            <rect x="-100" y="-150" width="220" height="150" class="data-box"/>
            <text x="10" y="-120" class="label" font-size="16" text-anchor="middle">TELEMETRY DATA</text>
            <line x1="-80" y1="-110" x2="100" y2="-110" stroke="#e2e8f0"/>
            
            <text x="-80" y="-85" class="label" font-size="12">INST FLOW:</text>
            <text x="100" y="-85" id="v-flow" class="val val-highlight" text-anchor="end">0.0 L/m</text>
            
            <text x="-80" y="-55" class="label" font-size="12">TOTAL VOL:</text>
            <text x="100" y="-55" id="v-total" class="val" fill="#2563eb" text-anchor="end">0.0 L</text>
            
            <text x="-80" y="-25" class="label" font-size="12">VALVE OPEN:</text>
            <text x="100" y="-25" id="v-valve-act" class="val" fill="#0f172a" text-anchor="end">0%</text>
        </g>

        <foreignObject x="1150" y="450" width="400" height="350">
            <div style="width: 100%; height: 100%; background: #fff; border: 2px solid #0f172a; border-radius: 4px; padding: 10px; box-shadow: 3px 3px 0 rgba(0,0,0,0.1);">
                <canvas id="flowChart"></canvas>
            </div>
        </foreignObject>

    </svg>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyA9TrLnpHEsRijt8hbljFrJA0AU2c-Jk5g",
        authDomain: "majortrial-1.firebaseapp.com",
        databaseURL: "https://majortrial-1-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "majortrial-1",
        storageBucket: "majortrial-1.firebasestorage.app",
        messagingSenderId: "590621103333",
        appId: "1:590621103333:web:0c98d6b783bc9f12dd300c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- DOM ELEMENTS ---
    const el = {
        status: document.getElementById('status-badge'),
        uptime: document.getElementById('v-uptime'),
        slider: document.getElementById('valve-slider'),
        lblValveSet: document.getElementById('lbl-valve-set'),
        coreMa: document.getElementById('core-ma'),
        coreMb: document.getElementById('core-mb'),
        coreMerge: document.getElementById('core-merge'),
        coreMain: document.getElementById('core-main'),
        dashMerge: document.getElementById('dash-merge'),
        dashMain: document.getElementById('dash-main'),
        gearA: document.getElementById('gear-a'),
        gearB: document.getElementById('gear-b'),
        lblMa: document.getElementById('lbl-ma'),
        lblMb: document.getElementById('lbl-mb'),
        valveDisc: document.getElementById('valve-disc'),
        vRaw: document.getElementById('v-raw'),
        vAdc: document.getElementById('v-adc'),
        vKalman: document.getElementById('v-kalman'),
        vOffset: document.getElementById('v-offset'),
        vFlow: document.getElementById('v-flow'),
        vTotal: document.getElementById('v-total'),
        vValveAct: document.getElementById('v-valve-act')
    };

    // --- CHART.JS SETUP (Flow vs EMF Time-Series) ---
    const ctx = document.getElementById('flowChart').getContext('2d');
    const flowChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], // Time labels
            datasets: [
                { label: 'Flow (L/m)', data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', yAxisID: 'y', fill: true, tension: 0.4 },
                { label: 'Kalman EMF (mV)', data: [], borderColor: '#ef4444', borderDash: [5, 5], yAxisID: 'y1', tension: 0.4 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            animation: false, // Turn off animation for smooth SCADA feel
            plugins: { title: { display: true, text: 'REAL-TIME FLOW VS EMF', font: { family: 'Inter', weight: 'bold' } } },
            scales: {
                x: { display: false }, // Hide time labels for cleaner look
                y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Flow (L/m)' }, min: 0 },
                y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'EMF (mV)' }, grid: { drawOnChartArea: false } }
            }
        }
    });

    // Helper to format Uptime seconds to HH:MM:SS
    function formatUptime(seconds) {
        if (!seconds) return "00:00:00";
        const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${h}:${m}:${s}`;
    }

    // --- INPUT HANDLING (Slider -> Firebase) ---
    // Update label locally immediately for snappy UI
    el.slider.addEventListener('input', (e) => {
        el.lblValveSet.textContent = e.target.value + '%';
    });
    // Write to Firebase when slider is released (to prevent spamming)
    el.slider.addEventListener('change', (e) => {
        set(ref(db, 'control/valve_setpoint'), parseInt(e.target.value));
    });

    // --- CONNECTION STATUS ---
    onValue(ref(db, '.info/connected'), (snap) => {
        if (snap.val() === true) {
            el.status.textContent = '● ONLINE';
            el.status.className = 'sys-status online';
        } else {
            el.status.textContent = '● OFFLINE';
            el.status.className = 'sys-status offline';
        }
    });

    // --- MASTER TELEMETRY LISTENER ---
    // The ESP32 is the master. We only update the UI based on what the ESP32 writes to `telemetry/`.
    onValue(ref(db, 'telemetry'), (snapshot) => {
        const data = snapshot.val() || {};
        
        // 1. Motors State
        const m_a = data.motors?.a_on || false;
        const m_b = data.motors?.b_on || false;
        const any_flow = m_a || m_b;

        // Visuals for Motor A
        el.coreMa.classList.toggle('flowing', m_a);
        if(m_a) el.gearA.classList.add('spinning'); else el.gearA.classList.remove('spinning');
        el.lblMa.textContent = m_a ? 'ON' : 'OFF';
        el.lblMa.setAttribute('fill', m_a ? '#22c55e' : '#ef4444');

        // Visuals for Motor B
        el.coreMb.classList.toggle('flowing', m_b);
        if(m_b) el.gearB.classList.add('spinning'); else el.gearB.classList.remove('spinning');
        el.lblMb.textContent = m_b ? 'ON' : 'OFF';
        el.lblMb.setAttribute('fill', m_b ? '#22c55e' : '#ef4444');

        // Visuals for Merge & Main Line
        el.coreMerge.classList.toggle('flowing', any_flow);
        el.coreMain.classList.toggle('flowing', any_flow);
        if(any_flow) {
            el.dashMerge.classList.add('flowing-dash');
            el.dashMain.classList.add('flowing-dash');
        } else {
            el.dashMerge.classList.remove('flowing-dash');
            el.dashMain.classList.remove('flowing-dash');
        }

        // 2. Valve State (Actual position reported by ESP32)
        const v_act = data.valve?.current_pct || 0;
        el.vValveAct.textContent = v_act + '%';
        // Rotate valve visual (-90deg is closed, 0deg is open. We interpolate based on %)
        const rotation = -90 + (v_act / 100) * 90;
        el.valveDisc.style.transform = `rotate(${rotation}deg)`;

        // 3. Signals (Raw, ADC, Kalman, Offset)
        const s_raw = data.signals?.raw_emf || 0;
        const s_adc = data.signals?.adc_emf || 0;
        const s_kal = data.signals?.kalman_emf || 0;
        const s_off = data.signals?.offset || 0;
        
        el.vRaw.textContent = s_raw.toFixed(2) + ' mV';
        el.vAdc.textContent = s_adc; // Digital value
        el.vKalman.textContent = s_kal.toFixed(2) + ' mV';
        el.vOffset.textContent = s_off.toFixed(2) + ' mV';

        // 4. Flow & Uptime
        const f_rate = data.flow?.rate || 0;
        const f_total = data.flow?.total || 0;
        const uptime = data.flow?.uptime || 0;

        el.vFlow.textContent = f_rate.toFixed(2) + ' L/m';
        el.vTotal.textContent = f_total.toFixed(1) + ' L';
        el.uptime.textContent = formatUptime(uptime);

        // 5. Update Chart (Rolling 30 points)
        const timeNow = new Date().toLocaleTimeString();
        flowChart.data.labels.push(timeNow);
        flowChart.data.datasets[0].data.push(f_rate);
        flowChart.data.datasets[1].data.push(s_kal);

        if (flowChart.data.labels.length > 30) {
            flowChart.data.labels.shift();
            flowChart.data.datasets[0].data.shift();
            flowChart.data.datasets[1].data.shift();
        }
        flowChart.update();
    });

</script>
</body>
</html>
